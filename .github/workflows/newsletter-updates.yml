name: Newsletter admin pipeline

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'updates.xml'
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send even if auto send on push is disabled"
        required: false
        default: false
        type: boolean
      custom_subject:
        description: "Optional subject override"
        required: false
        type: string
      custom_html:
        description: "Optional HTML override"
        required: false
        type: string

jobs:
  send-newsletter:
    if: ${{ secrets.BREVO_API_KEY != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build campaign payload from admin config
        id: payload
        env:
          FORCE_SEND: ${{ github.event.inputs.force_send || 'false' }}
          CUSTOM_SUBJECT: ${{ github.event.inputs.custom_subject || '' }}
          CUSTOM_HTML: ${{ github.event.inputs.custom_html || '' }}
          NEWSLETTER_ENABLED: ${{ vars.NEWSLETTER_ENABLED || 'true' }}
          NEWSLETTER_AUTO_SEND_ON_PUSH: ${{ vars.NEWSLETTER_AUTO_SEND_ON_PUSH || 'true' }}
          NEWSLETTER_SENDER_NAME: 'FINKE SWISS'
          NEWSLETTER_SENDER_EMAIL: 'chloe.mendes@finkeswiss.ch'
          NEWSLETTER_LIST_ID: '2'
          NEWSLETTER_SUBJECT_TEMPLATE: ${{ vars.NEWSLETTER_SUBJECT_TEMPLATE || '' }}
          NEWSLETTER_HTML_TEMPLATE: ${{ vars.NEWSLETTER_HTML_TEMPLATE || '' }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          function escapeHtml(value) {
            return String(value || '')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#39;');
          }

          function getFirstTag(source, tag) {
            const match = source.match(new RegExp('<' + tag + '>([\\s\\S]*?)<\\/' + tag + '>'));
            return match ? match[1].replace(/\s+/g, ' ').trim() : '';
          }

          function stripHtml(value) {
            return String(value || '')
              .replace(/<[^>]+>/g, ' ')
              .replace(/\s+/g, ' ')
              .trim();
          }

          function parseBool(value, defaultValue) {
            if (value === undefined || value === null || String(value).trim() === '') return defaultValue;
            const normalized = String(value).trim().toLowerCase();
            if (normalized === '1' || normalized === 'true' || normalized === 'yes' || normalized === 'on') return true;
            if (normalized === '0' || normalized === 'false' || normalized === 'no' || normalized === 'off') return false;
            return defaultValue;
          }

          function extractLatestFromIndex(source) {
            const sectionMatch = source.match(/<section[^>]*id="content-08"[\\s\\S]*?<\/section>/i);
            const sectionSource = sectionMatch ? sectionMatch[0] : source;
            const cardMatch = sectionSource.match(/<article[^>]*class="[^"]*release-card[^"]*"[^>]*>([\\s\\S]*?)<\/article>/i);
            if (!cardMatch) return null;

            const cardSource = cardMatch[1];
            const titleMatch = cardSource.match(/<h3[^>]*>([\\s\\S]*?)<\/h3>/i);
            const paragraphMatch = cardSource.match(/<p[^>]*>([\\s\\S]*?)<\/p>/i);
            const listBlockMatch = cardSource.match(/<ul[^>]*>([\\s\\S]*?)<\/ul>/i);

            const rawTitle = stripHtml(titleMatch ? titleMatch[1] : '');
            const rawDescription = stripHtml(paragraphMatch ? paragraphMatch[1] : '');

            let highlightsHtml = '';
            if (listBlockMatch) {
              const itemRegex = /<li[^>]*>([\\s\\S]*?)<\/li>/gi;
              const items = [];
              let itemMatch;
              while ((itemMatch = itemRegex.exec(listBlockMatch[1])) !== null) {
                const text = stripHtml(itemMatch[1]);
                if (text) items.push('<li>' + escapeHtml(text) + '</li>');
              }
              if (items.length > 0) {
                highlightsHtml = '<ul>' + items.join('') + '</ul>';
              }
            }

            if (!rawTitle) return null;

            return {
              titleRaw: rawTitle,
              descriptionRaw: rawDescription || 'Une nouvelle publication est disponible.',
              linkRaw: '#content-08-01',
              highlightsHtml: highlightsHtml
            };
          }

          const xml = fs.readFileSync('updates.xml', 'utf8');
          const firstItem = xml.match(/<item>([\s\S]*?)<\/item>/);
          const itemSource = firstItem ? firstItem[1] : '';

          const xmlTitleRaw = getFirstTag(itemSource, 'title') || 'Nouvelle mise a jour CRM';
          const xmlDescriptionRaw = getFirstTag(itemSource, 'description') || 'Une nouvelle publication est disponible.';
          const xmlLinkRaw = getFirstTag(itemSource, 'link') || '#content-08-01';

          const indexSource = fs.existsSync('index.html') ? fs.readFileSync('index.html', 'utf8') : '';
          const latestFromIndex = indexSource ? extractLatestFromIndex(indexSource) : null;

          const titleRaw = latestFromIndex ? latestFromIndex.titleRaw : xmlTitleRaw;
          const descriptionRaw = latestFromIndex ? latestFromIndex.descriptionRaw : xmlDescriptionRaw;
          const linkRaw = latestFromIndex ? latestFromIndex.linkRaw : xmlLinkRaw;
          const highlightsHtml = latestFromIndex ? latestFromIndex.highlightsHtml : '';

          const title = escapeHtml(titleRaw);
          const description = escapeHtml(descriptionRaw);
          const highlights = highlightsHtml || '<p style="margin:0">Consultez l\'onglet 8 pour le detail complet.</p>';
          const updateLink = linkRaw.startsWith('http')
            ? linkRaw
            : 'https://chlaze.github.io/guide-calaotrade/' + String(linkRaw).replace(/^\//, '');
          const guideLink = 'https://chlaze.github.io/guide-calaotrade/';

          const enabled = parseBool(process.env.NEWSLETTER_ENABLED, true);
          const autoSendOnUpdates = parseBool(process.env.NEWSLETTER_AUTO_SEND_ON_PUSH, true);
          const senderName = process.env.NEWSLETTER_SENDER_NAME || 'Finke CRM';
          const senderEmail = process.env.NEWSLETTER_SENDER_EMAIL || '';
          const listId = String(process.env.NEWSLETTER_LIST_ID || '');

          const defaultSubject = '[Guide CRM] {{title}}';
          const defaultHtml = "<h2 style='color:#0f1e35'>{{title}}</h2><p>{{description}}</p>{{highlightsHtml}}<p><a href='{{updateLink}}' style='color:#c9a84c'>Voir la mise a jour</a></p><p><a href='{{guideLink}}'>Ouvrir le guide complet</a></p><hr><p style='font-size:12px;color:#666'>Vous recevez cet email car vous etes abonne aux mises a jour.</p>";

          const subjectTemplate = process.env.CUSTOM_SUBJECT || process.env.NEWSLETTER_SUBJECT_TEMPLATE || defaultSubject;
          const htmlTemplate = process.env.CUSTOM_HTML || process.env.NEWSLETTER_HTML_TEMPLATE || defaultHtml;

          const replaceVars = (input) => String(input)
            .replace(/{{title}}/g, title)
            .replace(/{{description}}/g, description)
            .replace(/{{updateLink}}/g, updateLink)
            .replace(/{{guideLink}}/g, guideLink)
            .replace(/{{highlightsHtml}}/g, highlights);

          const subject = replaceVars(subjectTemplate);
          const htmlContent = replaceVars(htmlTemplate);

          const skipOnPush = process.env.GITHUB_EVENT_NAME === 'push' && !autoSendOnUpdates;
          const forced = String(process.env.FORCE_SEND || '').toLowerCase() === 'true';
          const shouldSend = enabled && (!skipOnPush || forced);

          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, 'should_send=' + (shouldSend ? 'true' : 'false') + '\n');
          fs.appendFileSync(out, 'subject=' + subject + '\n');
          fs.appendFileSync(out, 'html_content<<EOF\n' + htmlContent + '\nEOF\n');
          fs.appendFileSync(out, 'sender_name=' + senderName + '\n');
          fs.appendFileSync(out, 'sender_email=' + senderEmail + '\n');
          fs.appendFileSync(out, 'list_id=' + listId + '\n');
          NODE

      - name: Stop when newsletter is disabled
        if: steps.payload.outputs.should_send != 'true'
        run: |
          echo "Newsletter disabled or auto send turned off. No email sent."

      - name: Validate required settings
        if: steps.payload.outputs.should_send == 'true'
        env:
          CFG_SENDER_EMAIL: ${{ steps.payload.outputs.sender_email }}
          CFG_LIST_ID: ${{ steps.payload.outputs.list_id }}
        run: |
          SENDER_EMAIL="${CFG_SENDER_EMAIL:-chloe.mendes@finkeswiss.ch}"
          LIST_ID="${CFG_LIST_ID:-2}"
          if [ -z "$SENDER_EMAIL" ]; then
            echo "Missing sender email. Set vars.NEWSLETTER_SENDER_EMAIL or vars.BREVO_SENDER_EMAIL"
            exit 1
          fi
          if [ -z "$LIST_ID" ]; then
            echo "Missing list id. Set vars.NEWSLETTER_LIST_ID or vars.BREVO_LIST_ID"
            exit 1
          fi

      - name: Create Brevo campaign
        if: steps.payload.outputs.should_send == 'true'
        id: campaign
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          SUBJECT: ${{ steps.payload.outputs.subject }}
          HTML_CONTENT: ${{ steps.payload.outputs.html_content }}
          CFG_SENDER_NAME: ${{ steps.payload.outputs.sender_name }}
          CFG_SENDER_EMAIL: ${{ steps.payload.outputs.sender_email }}
          CFG_LIST_ID: ${{ steps.payload.outputs.list_id }}
        run: |
          SENDER_NAME="${CFG_SENDER_NAME:-FINKE SWISS}"
          SENDER_EMAIL="${CFG_SENDER_EMAIL:-chloe.mendes@finkeswiss.ch}"
          LIST_ID="${CFG_LIST_ID:-2}"
          export SENDER_NAME SENDER_EMAIL LIST_ID

          node <<'NODE'
          const fs = require('fs');
          const payload = {
            name: process.env.SUBJECT,
            subject: process.env.SUBJECT,
            sender: { name: process.env.SENDER_NAME || 'Finke CRM', email: process.env.SENDER_EMAIL },
            type: 'classic',
            htmlContent: process.env.HTML_CONTENT,
            recipients: { listIds: [Number(process.env.LIST_ID)] }
          };
          fs.writeFileSync('brevo-campaign.json', JSON.stringify(payload));
          NODE

          RESPONSE=$(curl -sf -X POST "https://api.brevo.com/v3/emailCampaigns" \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json" \
            --data @brevo-campaign.json)

          CAMPAIGN_ID=$(echo "$RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id))")
          echo "campaign_id=$CAMPAIGN_ID" >> "$GITHUB_OUTPUT"

      - name: Send campaign now
        if: steps.payload.outputs.should_send == 'true'
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          CAMPAIGN_ID: ${{ steps.campaign.outputs.campaign_id }}
        run: |
          curl -sf -X POST "https://api.brevo.com/v3/emailCampaigns/$CAMPAIGN_ID/sendNow" \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json"
          echo "Campaign $CAMPAIGN_ID sent"
