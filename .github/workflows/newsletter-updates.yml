name: Send updates newsletter

on:
  push:
    branches: [main]
    paths:
      - 'updates.xml'

jobs:
  send-newsletter:
    # Requires BREVO_API_KEY secret + BREVO_LIST_ID and BREVO_SENDER_EMAIL variables
    if: ${{ secrets.BREVO_API_KEY != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract latest update from RSS
        id: latest
        run: |
          node <<'NODE'
          const fs = require('fs');
          const xml = fs.readFileSync('updates.xml', 'utf8');
          const firstItem = xml.match(/<item>([\s\S]*?)<\/item>/);
          function extract(tag, src) {
            const m = src.match(new RegExp('<' + tag + '>([\\s\\S]*?)<\/' + tag + '>'));
            return m ? m[1].replace(/\s+/g, ' ').trim() : '';
          }
          const src = firstItem ? firstItem[1] : '';
          const title = extract('title', src) || 'Nouvelle mise a jour CRM';
          const description = extract('description', src) || 'Une nouvelle publication est disponible.';
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, 'title=' + title + '\n');
          fs.appendFileSync(out, 'description=' + description + '\n');
          NODE

      - name: Create Brevo email campaign
        id: campaign
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ vars.BREVO_LIST_ID }}
          BREVO_SENDER_EMAIL: ${{ vars.BREVO_SENDER_EMAIL }}
          TITLE: ${{ steps.latest.outputs.title }}
          DESC: ${{ steps.latest.outputs.description }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.brevo.com/v3/emailCampaigns" \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"[Guide CRM] $TITLE\",
              \"subject\": \"[Guide CRM] $TITLE\",
              \"sender\": {\"name\": \"Finke CRM\", \"email\": \"$BREVO_SENDER_EMAIL\"},
              \"type\": \"classic\",
              \"htmlContent\": \"<h2 style='color:#0f1e35'>$TITLE</h2><p>$DESC</p><p><a href='https://chlaze.github.io/guide-calaotrade/' style='color:#c9a84c'>Voir la mise a jour sur le guide</a></p><hr><p style='font-size:12px;color:#666'>Finke CRM - Vous recevez cet email car vous etes abonne aux mises a jour.</p>\",
              \"recipients\": {\"listIds\": [$BREVO_LIST_ID]}
            }")
          CAMPAIGN_ID=$(echo $RESPONSE | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id))")
          echo "campaign_id=$CAMPAIGN_ID" >> $GITHUB_OUTPUT

      - name: Send Brevo campaign immediately
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          CAMPAIGN_ID: ${{ steps.campaign.outputs.campaign_id }}
        run: |
          curl -s -X POST "https://api.brevo.com/v3/emailCampaigns/$CAMPAIGN_ID/sendNow" \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json"
          echo "Campaign $CAMPAIGN_ID sent to Brevo list"
